<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="MathQuest: An interactive, fun, and child-friendly math learning quest from Pre-K counting up to double-digit column arithmetic, multiplication, and division." />
    
    <!-- SEO Optimization -->
    <title>MathQuest: Interactive Math Learning for Kids</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/math.png" />
  </head>
  <body>
    <!-- Single Page Application Mount Point -->
    <div id="app">
      <!-- High-fidelity loading animation inside fallback portal -->
      <div class="initial-app-loader" style="text-align: center; font-family: 'Fredoka', sans-serif; padding-top: 35vh; color: #816e62;">
        <div class="loader-spinner" style="width: 60px; height: 60px; border: 6px solid #ffece0; border-top: 6px solid #ff6b8b; border-radius: 50%; margin: 0 auto 1.5rem auto; animation: spin 1s linear infinite;"></div>
        <h2 style="font-size: 2rem; margin-bottom: 0.5rem; color: #ff6b8b;">Entering MathQuest...</h2>
        <p style="font-size: 1.1rem; opacity: 0.85;">Preparing your learning adventure!</p>
      </div>
    </div>

    <!-- Style keyframe spinner backup -->
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
